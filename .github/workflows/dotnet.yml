name: .NET

permissions:
  actions: write
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build TeleportCommand.csproj --no-restore

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TeleportPlugin
        path: bin/Debug/net9.0/TeleportPlugin.dll
